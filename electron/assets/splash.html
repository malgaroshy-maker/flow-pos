<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منظومة Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    /* Animated background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(30, 100, 220, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(0, 140, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Rotating ring */
    .logo-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, #1a6dff, #00c3ff, #0a3a8a, #1a6dff) border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 6s linear infinite;
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo-wrap img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 20px;
      filter: drop-shadow(0 0 24px rgba(30, 120, 255, 0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(30, 120, 255, 0.4)); }
      50%       { filter: drop-shadow(0 0 36px rgba(30, 180, 255, 0.7)); }
    }

    .title-block {
      text-align: center;
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
      text-shadow: 0 0 24px rgba(60, 160, 255, 0.5);
    }

    .app-subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(160, 200, 255, 0.75);
      letter-spacing: 0.08em;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(60, 160, 255, 0.6), transparent);
      margin: 4px auto;
    }

    /* Loading dots */
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .loading-text {
      font-size: 13px;
      color: rgba(120, 180, 255, 0.7);
      letter-spacing: 0.05em;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2a7fff;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1.0); opacity: 1; }
    }

    /* Progress bar */
    .progress-wrap {
      width: 280px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a6dff, #00c3ff);
      border-radius: 2px;
      animation: fillBar 3s ease-in-out forwards;
    }

    @keyframes fillBar {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 78%; }
      100% { width: 95%; }
    }

    .version {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: rgba(100, 140, 200, 0.4);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img src="logo.png" alt="Flow Dev Logo" />
    </div>

    <div class="title-block">
      <div class="app-name">منظومة Flow</div>
      <div class="divider"></div>
      <div class="app-subtitle">FLOW DEV — INTELLIGENT SOFTWARE SOLUTIONS</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="loading">
      <span class="loading-text">جاري تشغيل الخادم</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="version">v1.4.1</div>
</body>
</html>
